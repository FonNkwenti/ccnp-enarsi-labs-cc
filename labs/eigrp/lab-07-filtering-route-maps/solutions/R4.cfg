!
! Lab 07 — Route Filtering & Route Maps
! Solution Config: R4 (Stub / Edge)
! Platform: c7200 | IOS: 15.3(3)XB12 | Console: 127.0.0.1:5004
!
! Lab 07 additions from lab-06 solutions:
!   + route-map RM_DENY_TAG_200 deny 10 (match tag 200 — drop Branch-A tagged routes)
!   + route-map RM_DENY_TAG_200 permit 20 (permit all other routes)
!   + topology base: distribute-list route-map RM_DENY_TAG_200 in
!
! Network statement verification:
!   network 10.14.0.0 0.0.0.3     -> fa0/0 (10.14.0.2/30)   ✓
!   network 10.0.0.4 0.0.0.0      -> Lo0  (10.0.0.4/32)     ✓
!   network 192.168.4.0 0.0.0.255 -> Lo1  (192.168.4.1/24)  ✓
!
hostname R4
!
no ip domain-lookup
!
ipv6 unicast-routing
!
route-map RM_DENY_TAG_200 deny 10
 match tag 200
route-map RM_DENY_TAG_200 permit 20
!
interface Loopback0
 description Lo0 - Router ID
 ip address 10.0.0.4 255.255.255.255
 ipv6 address 2001:DB8::4/128
!
interface Loopback1
 description Lo1 - Stub LAN (simulated edge network)
 ip address 192.168.4.1 255.255.255.0
!
interface FastEthernet0/0
 description Link to R1 fa1/1 -- 10.14.0.0/30
 ip address 10.14.0.2 255.255.255.252
 ipv6 address 2001:DB8:14::2/64
 no shutdown
!
router eigrp ENARSI
 !
 address-family ipv4 unicast autonomous-system 100
  eigrp stub connected summary
  eigrp log-neighbor-changes
  network 10.14.0.0 0.0.0.3
  network 10.0.0.4 0.0.0.0
  network 192.168.4.0 0.0.0.255
  eigrp router-id 10.0.0.4
  no auto-summary
  topology base
   distribute-list route-map RM_DENY_TAG_200 in
  exit-af-topology
 exit-address-family
 !
 address-family ipv6 unicast autonomous-system 100
  eigrp stub connected summary
  eigrp log-neighbor-changes
  eigrp router-id 10.0.0.4
 exit-address-family
!
end
