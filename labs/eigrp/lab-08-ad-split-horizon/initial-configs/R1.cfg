!
! Lab 08 — Administrative Distance & Split Horizon
! Initial Config: R1 (Hub / Core) — copied from lab-07 solutions/R1.cfg
! Platform: c7200 | IOS: 15.3(3)XB12 | Console: 127.0.0.1:5001
!
hostname R1
!
no ip domain-lookup
!
ipv6 unicast-routing
!
ip prefix-list PFX_DENY_R4_STUB seq 5 deny 192.168.4.0/24
ip prefix-list PFX_DENY_R4_STUB seq 10 permit 0.0.0.0/0 le 32
!
interface Loopback0
 description Lo0 - Router ID
 ip address 10.0.0.1 255.255.255.255
 ipv6 address 2001:DB8::1/128
!
interface FastEthernet0/0
 description Link to R2 fa0/0 -- 10.12.0.0/30 [DEGRADED: bandwidth 512, delay 2000]
 ip address 10.12.0.1 255.255.255.252
 ipv6 address 2001:DB8:12::1/64
 bandwidth 512
 delay 2000
 no shutdown
!
interface FastEthernet1/0
 description Link to R3 fa0/0 -- 10.13.0.0/30
 ip address 10.13.0.1 255.255.255.252
 ipv6 address 2001:DB8:13::1/64
 no shutdown
!
interface FastEthernet1/1
 description Link to R4 fa0/0 -- 10.14.0.0/30
 ip address 10.14.0.1 255.255.255.252
 ipv6 address 2001:DB8:14::1/64
 no shutdown
!
line con 0
 logging synchronous
 exec-timeout 0 0
!
line vty 0 4
 transport input telnet
!
router eigrp ENARSI
 !
 address-family ipv4 unicast autonomous-system 100
  eigrp log-neighbor-changes
  network 10.12.0.0 0.0.0.3
  network 10.13.0.0 0.0.0.3
  network 10.14.0.0 0.0.0.3
  network 10.0.0.1 0.0.0.0
  eigrp router-id 10.0.0.1
  no auto-summary
  variance 5
  topology base
   distribute-list prefix PFX_DENY_R4_STUB out FastEthernet0/0
   distribute-list prefix PFX_DENY_R4_STUB out FastEthernet1/0
  exit-af-topology
 exit-address-family
 !
 address-family ipv6 unicast autonomous-system 100
  eigrp log-neighbor-changes
  eigrp router-id 10.0.0.1
 exit-address-family
!
end
