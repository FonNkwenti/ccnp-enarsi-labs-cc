!
! Lab 08 — Administrative Distance & Split Horizon
! Initial Config: R2 (Branch A) — copied from lab-07 solutions/R2.cfg
! Platform: c7200 | IOS: 15.3(3)XB12 | Console: 127.0.0.1:5002
!
hostname R2
!
no ip domain-lookup
!
ipv6 unicast-routing
!
ip prefix-list PFX_BRANCH_A_SUMMARY seq 5 permit 172.16.20.0/23
!
route-map RM_TAG_BRANCH_A permit 10
 match ip address prefix-list PFX_BRANCH_A_SUMMARY
 set tag 200
route-map RM_TAG_BRANCH_A permit 20
!
interface Loopback0
 description Lo0 - Router ID
 ip address 10.0.0.2 255.255.255.255
 ipv6 address 2001:DB8::2/128
!
interface Loopback1
 description Lo1 - Branch-A LAN segment 1
 ip address 172.16.20.1 255.255.255.0
!
interface Loopback2
 description Lo2 - Branch-A LAN segment 2
 ip address 172.16.21.1 255.255.255.0
!
interface FastEthernet0/0
 description Link to R1 fa0/0 -- 10.12.0.0/30
 ip address 10.12.0.2 255.255.255.252
 ipv6 address 2001:DB8:12::2/64
 no shutdown
!
interface FastEthernet0/1
 description Link to R3 fa0/1 -- 10.23.0.0/30
 ip address 10.23.0.1 255.255.255.252
 ipv6 address 2001:DB8:23::1/64
 no shutdown
!
line con 0
 logging synchronous
 exec-timeout 0 0
!
line vty 0 4
 transport input telnet
!
router eigrp ENARSI
 !
 address-family ipv4 unicast autonomous-system 100
  eigrp log-neighbor-changes
  network 10.12.0.0 0.0.0.3
  network 10.23.0.0 0.0.0.3
  network 10.0.0.2 0.0.0.0
  network 172.16.20.0 0.0.0.255
  network 172.16.21.0 0.0.0.255
  af-interface FastEthernet0/0
   summary-address 172.16.20.0 255.255.254.0
  exit-af-interface
  af-interface FastEthernet0/1
   summary-address 172.16.20.0 255.255.254.0
  exit-af-interface
  eigrp router-id 10.0.0.2
  no auto-summary
  topology base
   distribute-list route-map RM_TAG_BRANCH_A out
  exit-af-topology
 exit-address-family
 !
 address-family ipv6 unicast autonomous-system 100
  eigrp log-neighbor-changes
  eigrp router-id 10.0.0.2
 exit-address-family
!
end
